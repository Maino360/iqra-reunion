<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ইকরা ঈদ পুনর্মিলনী ২০২৬ </title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>
@import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;500;700&display=swap');

:root {
  --dynamic-accent: #6366f1;
  --dynamic-accent-rgb: 99, 102, 241;
  --bg-dark: #0f172a;
  --card-bg: rgba(30, 41, 59, 0.7);
}

body {
  font-family: 'Hind Siliguri', sans-serif;
  background-color: var(--bg-dark);
  background-image: radial-gradient(circle at top right, rgba(var(--dynamic-accent-rgb), 0.15), transparent),
                    radial-gradient(circle at bottom left, rgba(var(--dynamic-accent-rgb), 0.1), transparent);
  color: #f8fafc;
  min-height: 100vh;
  overflow: hidden; 
  display: flex;
  flex-direction: column;
}

/* --- অ্যাপের মতো ক্যানভাস কন্টেইনার --- */
.app-container {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
  padding-bottom: 280px; 
}

#canvas-wrapper {
  position: relative;
  width: 100%;
  max-width: 380px;
  aspect-ratio: 1/1;
  border-radius: 40px;
  box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
  overflow: hidden;
  border: 8px solid rgba(255, 255, 255, 0.05);
  background: #000;
}

#canvas {
  width: 100%;
  height: 100%;
  touch-action: none;
}

/* --- নিচের এডিটিং প্যানেল --- */
.bottom-panel {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--card-bg);
  backdrop-filter: blur(20px);
  border-top: 1px solid rgba(255,255,255,0.1);
  border-radius: 32px 32px 0 0;
  padding: 24px;
  z-index: 100;
  box-shadow: 0 -10px 40px rgba(0,0,0,0.4);
}

.panel-handle {
  width: 40px;
  height: 4px;
  background: rgba(255,255,255,0.2);
  border-radius: 2px;
  margin: -10px auto 20px;
}

.action-btn {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  height: 50px;
  width: 50px;
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}

.action-btn:active {
  transform: scale(0.9);
  background: var(--dynamic-accent);
}

.download-btn {
  background: linear-gradient(135deg, var(--dynamic-accent), #4f46e5);
  padding: 16px;
  border-radius: 20px;
  font-weight: 700;
  width: 100%;
  margin-top: 20px;
  box-shadow: 0 10px 20px -5px rgba(var(--dynamic-accent-rgb), 0.4);
}

#dropZone {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(15, 23, 42, 0.8);
  z-index: 10;
  transition: 0.3s;
}

input[type=range] {
  -webkit-appearance: none;
  width: 100%;
  background: transparent;
}
input[type=range]::-webkit-slider-runnable-track {
  height: 6px;
  background: rgba(255,255,255,0.1);
  border-radius: 10px;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  height: 20px;
  width: 20px;
  border-radius: 50%;
  background: #fff;
  margin-top: -7px;
  box-shadow: 0 0 10px rgba(0,0,0,0.5);
}

#notification {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(-100px);
  background: #fff;
  color: #000;
  padding: 12px 24px;
  border-radius: 50px;
  font-weight: 600;
  transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  z-index: 1000;
  display: flex;
  align-items: center;
  gap: 10px;
  box-shadow: 0 15px 30px rgba(0,0,0,0.3);
}
#notification.show { transform: translateX(-50%) translateY(0); }

/* In-App Browser Alert Style */
.alert-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(10px);
  z-index: 9999;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.alert-card {
  background: #1e293b;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 30px;
  padding: 30px;
  max-width: 350px;
  text-align: center;
  box-shadow: 0 20px 40px rgba(0,0,0,0.5);
}
</style>
</head>
<body>

<div id="inAppAlert" class="alert-overlay">
  <div class="alert-card animate-bounce-in">
    <div class="w-16 h-16 bg-amber-500/20 text-amber-500 rounded-2xl flex items-center justify-center mx-auto mb-4">
      <i class="fa-solid fa-triangle-exclamation text-2xl"></i>
    </div>
    <h3 class="text-xl font-bold text-white mb-2">ব্রাউজার সমস্যা!</h3>
    <p class="text-slate-400 text-sm mb-6">আপনি মেসেঞ্জার বা ফেসবুক ব্রাউজারে আছেন। সঠিক ভাবে ছবি সেভ করতে উপরের ৩-ডট মেনু থেকে <b>'Open in Chrome/Browser'</b> করুন।</p>
    <button onclick="closeAlert()" class="w-full py-3 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl font-bold transition">ঠিক আছে</button>
  </div>
</div>

<div id="notification">
  <i class="fa-solid fa-circle-check text-indigo-600"></i>
  <span id="notifText">ছবি তৈরি হয়েছে!</span>
</div>

<header class="p-6 flex justify-between items-center">
  <div>
    <h1 class="text-xl font-bold tracking-tight">ইকরা ঈদ পুনর্মিলনী ২০২৬</h1>
    <p class="text-[10px] text-slate-400 uppercase tracking-widest">Amirabad, Lohagara, Chattogram.</p>
  </div>
  <button id="resetBtn" class="text-slate-400 hover:text-white transition">
    <i class="fa-solid fa-rotate-left text-lg"></i>
  </button>
</header>

<div class="app-container">
  <div id="canvas-wrapper">
    <div id="dropZone">
      <div class="w-16 h-16 bg-indigo-600 rounded-full flex items-center justify-center mb-4 animate-bounce">
        <i class="fa-solid fa-plus text-2xl"></i>
      </div>
      <p class="font-bold">আপনার ছবি আপলোড করুন</p>
      <input type="file" id="upload" accept="image/*" class="hidden">
    </div>
    <canvas id="canvas" width="2000" height="2000"></canvas>
  </div>
</div>

<div class="bottom-panel">
  <div class="panel-handle"></div>
  
  <div class="space-y-6">
    <div class="flex items-center gap-4">
      <i class="fa-solid fa-minus text-slate-500 text-xs"></i>
      <input type="range" id="zoomSlider" min="0.1" max="3" step="0.01" value="1">
      <i class="fa-solid fa-plus text-slate-500 text-xs"></i>
    </div>

    <div class="flex justify-around items-center">
      <button id="mirrorBtn" class="action-btn" title="উল্টানো">
        <i class="fa-solid fa-arrows-left-right"></i>
      </button>
      <button id="rotateBtn" class="action-btn" title="ঘুরানো">
        <i class="fa-solid fa-rotate-right"></i>
      </button>
      <div class="h-8 w-[1px] bg-white/10"></div>
      <button onclick="document.getElementById('upload').click()" class="action-btn">
        <i class="fa-solid fa-image"></i>
      </button>
    </div>

    <button id="download" class="download-btn flex items-center justify-center gap-2">
      <span>ফটো সেভ করুন</span>
      <i class="fa-solid fa-arrow-down-long"></i>
    </button>
    
    <p class="text-center text-[10px] text-slate-500">
      Developed by <span class="text-indigo-400">Main Uddin Hasan</span>
    </p>
  </div>
</div>

<script>
const canvas = document.getElementById("canvas"), ctx = canvas.getContext("2d");
const upload = document.getElementById("upload"), dropZone = document.getElementById("dropZone");
const zoomSlider = document.getElementById("zoomSlider"), download = document.getElementById("download");
const notification = document.getElementById("notification"), notifText = document.getElementById("notifText");

const frame = new Image();
frame.src = "frame.png"; // নিশ্চিত করুন ফাইল পাথ সঠিক আছে

let userImage = null, imgX = 0, imgY = 0, imgScale = 1, rotation = 0, isMirrored = false;
let startX = 0, startY = 0, dragging = false;

// ইন-অ্যাপ ব্রাউজার ডিটেকশন
function checkInApp() {
  const ua = navigator.userAgent || navigator.vendor || window.opera;
  const isInApp = (ua.indexOf("FBAN") > -1) || (ua.indexOf("FBAV") > -1) || (ua.indexOf("Messenger") > -1) || (ua.indexOf("Instagram") > -1);
  if (isInApp) {
    document.getElementById('inAppAlert').style.display = 'flex';
  }
}
function closeAlert() { document.getElementById('inAppAlert').style.display = 'none'; }

window.onload = () => {
  drawCanvas();
  setTimeout(checkInApp, 1500);
};

function drawCanvas() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (userImage) {
    ctx.save();
    ctx.translate(canvas.width/2 + imgX, canvas.height/2 + imgY);
    ctx.rotate((rotation * Math.PI) / 180);
    if (isMirrored) ctx.scale(-1, 1);
    const sw = userImage.width * imgScale, sh = userImage.height * imgScale;
    ctx.drawImage(userImage, -sw/2, -sh/2, sw, sh);
    ctx.restore();
    dropZone.style.display = 'none';
  }
  ctx.drawImage(frame, 0, 0, canvas.width, canvas.height);
}

function handleFile(file) {
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    userImage = new Image();
    userImage.onload = () => {
      const ratio = Math.max(canvas.width / userImage.width, canvas.height / userImage.height);
      imgScale = ratio; zoomSlider.value = ratio;
      imgX = 0; imgY = 0;
      drawCanvas();
    };
    userImage.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

dropZone.onclick = () => upload.click();
upload.onchange = e => handleFile(e.target.files[0]);

zoomSlider.oninput = e => { imgScale = parseFloat(e.target.value); drawCanvas(); };
document.getElementById("rotateBtn").onclick = () => { rotation = (rotation + 90) % 360; drawCanvas(); };
document.getElementById("mirrorBtn").onclick = () => { isMirrored = !isMirrored; drawCanvas(); };
document.getElementById("resetBtn").onclick = () => { location.reload(); };

const startAction = (e) => {
    dragging = true;
    const pos = e.touches ? e.touches[0] : e;
    startX = pos.clientX; startY = pos.clientY;
};
const moveAction = (e) => {
    if (!dragging || !userImage) return;
    const pos = e.touches ? e.touches[0] : e;
    imgX += (pos.clientX - startX) * 4; 
    imgY += (pos.clientY - startY) * 4;
    startX = pos.clientX; startY = pos.clientY;
    drawCanvas();
};
canvas.addEventListener('mousedown', startAction);
window.addEventListener('mousemove', moveAction);
window.addEventListener('mouseup', () => dragging = false);
canvas.addEventListener('touchstart', startAction);
window.addEventListener('touchmove', moveAction);
window.addEventListener('touchend', () => dragging = false);

download.onclick = () => {
  showNotif("ছবিটি তৈরি হচ্ছে...");
  setTimeout(() => {
    try {
      const link = document.createElement("a");
      link.download = `Eid_Reunion_2026.png`;
      link.href = canvas.toDataURL("image/png");
      link.click();
      showNotif("সফলভাবে ডাউনলোড হয়েছে!");
    } catch (e) {
      showNotif("ছবিটির ওপর চেপে ধরে সেভ করুন");
    }
  }, 1000);
};

function showNotif(msg) {
  notifText.innerText = msg;
  notification.classList.add("show");
  setTimeout(() => notification.classList.remove("show"), 3000);
}
</script>
</body>
</html>
